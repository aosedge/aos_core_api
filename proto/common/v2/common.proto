syntax = "proto3";

package common.v2;

message ErrorInfo {
    int32  aos_code  = 1;
    int32  exit_code = 2;
    string message   = 3;
}

enum ItemType {
    SERVICE   = 0;
    COMPONENT = 1;
}

message InstanceIdent {
    string   item_id    = 1;
    string   subject_id = 2;
    uint64   instance   = 3;
    string   version    = 4;
    ItemType type       = 5;
}

message InstanceFilter {
    string item_id    = 1;
    string subject_id = 2;
    int64  instance   = 3;
}

message ArchInfo {
    string architecture = 1;
    string variant      = 2;
}

message OSInfo {
    string          os       = 1;
    string          version  = 2;
    repeated string features = 3;
}
